<!doctype html>
<html lang="en">
<!--
  Embeddable budget-support tile.

  Drop this into the cpl-project-tracker home page as either:
    1. an iframe:    <iframe src="https://.../budget-support/tile.html"
                             style="border:none;width:100%;height:280px"></iframe>
    2. inline:       copy the <script> block + a target <div id="cpl-bs-tile"></div>
                     into the tracker page's HTML.

  Reads from the public `campaign_summary_public` view only — no PII surfaces.
-->
<head>
  <meta charset="utf-8">
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .tile-wrap {
      background: white;
      border: 1px solid #d8dde6;
      border-radius: 8px;
      padding: 18px 20px;
      max-width: 520px;
    }
    .tile-wrap h3 {
      margin: 0 0 4px 0;
      color: #003a70;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }
    .tile-wrap .sub { font-size: 0.85rem; color: #5a6478; margin-bottom: 12px; }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 0.92rem;
    }
    .row .num { font-weight: 600; color: #003a70; font-variant-numeric: tabular-nums; }
    .bar { height: 6px; background: #e5e9f0; border-radius: 3px; overflow: hidden; margin-top: 2px; }
    .bar > div { height: 100%; background: #2469a4; }
    .cta {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 14px;
      background: #003a70;
      color: white;
      border-radius: 5px;
      font-size: 0.88rem;
      text-decoration: none;
      font-weight: 500;
    }
    .cta:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
<div id="cpl-bs-tile" class="tile-wrap">
  <h3>CPL Budget Support — May 2026 Revise</h3>
  <div class="sub">$37M ask: $2M ongoing + $35M one-time</div>
  <div id="cpl-bs-rows">Loading…</div>
  <a class="cta" href="./dashboard.html" target="_top">View status &amp; generate joint letters →</a>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2.45.0";
import { SUPABASE_URL, SUPABASE_ANON } from "./config.js";

const sb = createClient(SUPABASE_URL, SUPABASE_ANON, { auth: { persistSession: false }});

async function render() {
  const { data, error } = await sb.from("campaign_summary_public").select("*").order("name");
  if (error || !data) {
    document.getElementById("cpl-bs-rows").textContent = "Unable to load endorsement status.";
    return;
  }
  const rows = data.map((c) => {
    const total = Math.max(c.total_invited, 1);
    const pct = Math.round((c.supported_count / total) * 100);
    const label = c.letter_type === "rc" ? "Regional Consortia" : "Colleges (CEO/CIO/CSSO)";
    return `
      <div>
        <div class="row">
          <span>${label}</span>
          <span><span class="num">${c.supported_count}</span> / ${c.total_invited}</span>
        </div>
        <div class="bar"><div style="width:${pct}%"></div></div>
      </div>
    `;
  }).join("");
  document.getElementById("cpl-bs-rows").innerHTML = rows;
}
render();
</script>
</body>
</html>
